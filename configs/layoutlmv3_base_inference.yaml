MODEL:
  MASK_ON: true
  IMAGE_ONLY: true
  META_ARCHITECTURE: "GeneralizedRCNN"
  BACKBONE:
    NAME: "build_vit_fpn_backbone"
  FPN:
    IN_FEATURES: ["layer3", "layer5", "layer7", "layer11"]
  VIT:
    NAME: "layoutlmv3_base"
INPUT:
  MIN_SIZE_TEST: 800
  FORMAT: "RGB"
TEST:
  EVAL_PERIOD: 0
SOLVER:
  IMS_PER_BATCH: 1
  BASE_LR: 0.0001
  MAX_ITER: 100
  CHECKPOINT_PERIOD: 10000
OUTPUT_DIR: "./output"
